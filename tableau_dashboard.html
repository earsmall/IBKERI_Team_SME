<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IBKERI 중소기업팀의 태블로 시각화 대시보드를 한곳에서 확인하는 웹페이지입니다.">
  <title>중소기업팀 시각화 대시보드</title>
  <style>
    :root {
      --bg: #e9f2fb;
      --panel: rgba(249, 252, 255, 0.9);
      --panel-strong: #ffffff;
      --ink: #18212b;
      --muted: #627181;
      --line: rgba(58, 95, 140, 0.14);
      --accent: #1d4ed8;
      --accent-soft: rgba(29, 78, 216, 0.1);
      --accent-strong: #163b7a;
      --shadow: 0 18px 40px rgba(40, 72, 115, 0.12);
      --radius: 20px;
      --radius-sm: 14px;
      --font-ui: "Noto Sans KR", "Pretendard", "Malgun Gothic", sans-serif;
      --font-display: "Noto Sans KR", "Pretendard", "Malgun Gothic", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: var(--font-ui);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.74), transparent 34%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.18), transparent 24%),
        linear-gradient(180deg, #edf5ff 0%, #d9eafe 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.18) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      opacity: 0.35;
    }

    .shell {
      position: relative;
      display: grid;
      grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
      gap: 24px;
      padding: 24px;
      min-height: 100vh;
      max-width: 2400px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .sidebar {
      position: sticky;
      top: 24px;
      height: calc(100vh - 48px);
      padding: 24px 18px 18px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 18px;
      overflow: hidden;
    }

    .dept-name {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--accent-strong);
      line-height: 1.35;
      text-align: center;
    }

    .nav-switch {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .nav-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 0 16px;
      border-radius: 18px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      line-height: 1.3;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease, border-color 160ms ease;
      box-shadow: 0 12px 24px rgba(40, 72, 115, 0.12);
    }

    .nav-link:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .nav-link-read {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #ffffff;
      border-color: rgba(29, 78, 216, 0.28);
    }

    .nav-link-dashboard {
      background: linear-gradient(135deg, #0f766e, #0ea5a5);
      color: #ffffff;
      border-color: rgba(14, 165, 165, 0.28);
    }

    .nav-link.is-active {
      box-shadow: 0 16px 30px rgba(40, 72, 115, 0.18);
    }

    .nav-link:not(.is-active) {
      opacity: 0.86;
    }

    .nav-link-sub {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.35;
      opacity: 0.88;
    }

    .dashboard-list {
      display: grid;
      gap: 10px;
      align-content: start;
      overflow: auto;
      padding-right: 4px;
    }

    .list-label {
      text-align: center;
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .dashboard-btn {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(29, 78, 216, 0.12);
      border-radius: 18px;
      padding: 16px 16px 14px;
      background: rgba(255,255,255,0.76);
      cursor: pointer;
      color: inherit;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .dashboard-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(60, 52, 45, 0.1);
      border-color: rgba(29, 78, 216, 0.24);
      background: rgba(255,255,255,0.95);
    }

    .dashboard-btn.active {
      border-color: rgba(29, 78, 216, 0.42);
      background: linear-gradient(135deg, rgba(29, 78, 216, 0.12), rgba(255,255,255,0.98));
      box-shadow: 0 16px 28px rgba(40, 72, 115, 0.12);
    }

    .dashboard-btn strong {
      display: block;
      font-size: 16px;
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .main {
      min-height: calc(100vh - 48px);
    }

    .viewer {
      padding: 18px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      min-height: 0;
    }

    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .viewer-head h3 {
      margin: 0;
      font-size: 18px;
    }

    .viewer-note {
      font-size: 13px;
      color: var(--muted);
    }

    .viz-frame {
      min-height: 720px;
      border-radius: 18px;
      border: 1px solid rgba(29, 78, 216, 0.14);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(236, 244, 255, 0.96));
      overflow: hidden;
    }

    tableau-viz {
      width: 100%;
      height: 100%;
      min-height: 720px;
      background: transparent;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 320px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 1120px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
      }

      .main {
        min-height: auto;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 14px;
      }

      .sidebar,
      .viewer {
        padding: 18px;
      }

      .viz-frame,
      tableau-viz {
        min-height: 620px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar panel">
      <div>
        <div class="dept-name">IBK경제연구소 중기산업연구실 중소기업팀</div>
        <div class="nav-switch">
          <a class="nav-link nav-link-read" href="./index.html">
            <span>읽을거리</span>
            <span class="nav-link-sub">(정책 보도자료, 타 기관 연구보고서 등)</span>
          </a>
          <a class="nav-link nav-link-dashboard is-active" href="./tableau_dashboard.html">
            <span>시각화 대쉬보드</span>
            <span class="nav-link-sub">(중소기업 경기, 금융 관련 통계 활용)</span>
          </a>
        </div>
      </div>

      <div class="list-label">&lt; 대쉬보드 목록 &gt;</div>

      <div id="dashboardList" class="dashboard-list" aria-label="대시보드 목록"></div>
    </aside>

    <main class="main">
      <section class="viewer panel">
        <div class="viewer-head">
          <h3 id="viewerTitle">대시보드 보기</h3>
          <div class="viewer-note">브라우저 환경에 따라 로딩에 몇 초 정도 걸릴 수 있습니다.</div>
        </div>
        <div class="viz-frame">
          <div id="vizMount" class="empty">대시보드를 불러오는 중입니다.</div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>
  <script>
    const dashboards = [
      {
        id: "sme-overview",
        title: "중소기업 주요 현황",
        category: "SME",
        description: "중소기업 전반의 핵심 흐름을 빠르게 확인할 수 있는 기본 현황 대시보드입니다.",
        url: "https://public.tableau.com/views/__17502119731210/sheet30?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "self-employed-overview",
        title: "자영업자 주요 현황",
        category: "Self-employed",
        description: "자영업자 관련 주요 지표를 같은 레이아웃으로 확인할 수 있도록 연결했습니다.",
        url: "https://public.tableau.com/views/__17502333777740/sheet26?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "export-sme-overview",
        title: "수출 중소기업 주요 현황",
        category: "Exports",
        description: "수출 중소기업의 실적과 흐름을 집중해서 볼 수 있는 대시보드입니다.",
        url: "https://public.tableau.com/views/__17502346824890/sheet0_1?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "bank-loan-market",
        title: "은행권 중소기업대출 시장 현황",
        category: "Finance",
        description: "은행권의 중소기업대출 시장 규모와 동향을 살펴볼 수 있습니다.",
        url: "https://public.tableau.com/views/__17478138225250/sheet12?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "venture-investment",
        title: "벤처투자 현황",
        category: "Investment",
        description: "벤처투자 관련 지표를 빠르게 점검할 수 있는 시각화입니다.",
        url: "https://public.tableau.com/views/__2_17584658241570/sheet0?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "domestic-bank-overview",
        title: "국내은행 주요 현황",
        category: "Banking",
        description: "국내은행의 핵심 현황을 요약해서 살펴볼 수 있는 대시보드입니다.",
        url: "https://public.tableau.com/views/__17512724069940/sheet16?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "bok-fsa",
        title: "한국은행 연간 기업경영분석 주요 결과",
        category: "BOK",
        description: "한국은행 기업경영분석의 주요 결과를 시각적으로 정리한 대시보드입니다.",
        url: "https://public.tableau.com/views/250509_BOK_FSA/1?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      }
    ];

    const state = {
      selectedId: dashboards[0]?.id ?? null
    };

    const els = {
      dashboardList: document.getElementById("dashboardList"),
      viewerTitle: document.getElementById("viewerTitle"),
      vizMount: document.getElementById("vizMount")
    };

    function getFilteredDashboards() {
      return dashboards;
    }

    function getSelectedDashboard(filteredDashboards) {
      if (!filteredDashboards.length) return null;
      const selected = filteredDashboards.find(item => item.id === state.selectedId);
      if (selected) return selected;
      return filteredDashboards[0] ?? dashboards[0] ?? null;
    }

    function renderList(filteredDashboards, selectedDashboard) {
      if (!filteredDashboards.length) {
        els.dashboardList.innerHTML = '<div class="empty">검색 결과가 없습니다.<br>다른 키워드로 다시 찾아보세요.</div>';
        return;
      }

      els.dashboardList.innerHTML = filteredDashboards.map(item => `
        <button
          class="dashboard-btn${selectedDashboard && selectedDashboard.id === item.id ? " active" : ""}"
          type="button"
          data-id="${item.id}"
        >
          <strong>${item.title}</strong>
        </button>
      `).join("");
    }

    function renderViz(selectedDashboard) {
      if (!selectedDashboard) {
        els.vizMount.className = "empty";
        els.vizMount.textContent = "표시할 대시보드가 없습니다.";
        return;
      }

      els.vizMount.className = "";
      els.vizMount.innerHTML = `
        <tableau-viz
          id="tableauViz"
          src="${selectedDashboard.url}"
          toolbar="bottom"
          hide-tabs
          device="desktop"
        ></tableau-viz>
      `;
    }

    function render() {
      const filteredDashboards = getFilteredDashboards();

      if (!filteredDashboards.some(item => item.id === state.selectedId) && filteredDashboards[0]) {
        state.selectedId = filteredDashboards[0].id;
      }

      const selectedDashboard = getSelectedDashboard(filteredDashboards);

      renderList(filteredDashboards, selectedDashboard);
      renderViz(selectedDashboard);

      if (selectedDashboard) {
        els.viewerTitle.textContent = selectedDashboard.title;
      }

      document.querySelectorAll(".dashboard-btn").forEach(button => {
        button.addEventListener("click", () => {
          state.selectedId = button.dataset.id;
          render();
        });
      });
    }

    render();
  </script>
</body>
</html>
