<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="통계목록 기준으로 주요 통계를 대분류와 중분류로 정리하고 빠른 검색 링크를 함께 제공하는 페이지">
  <title>통계 카탈로그</title>
  <style>
    :root {
      --bg: #e9f2fb;
      --panel: rgba(249, 252, 255, 0.92);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --line: rgba(58, 95, 140, 0.14);
      --ink: #18212b;
      --muted: #627181;
      --accent-strong: #163b7a;
      --shadow: 0 18px 40px rgba(40, 72, 115, 0.12);
      --radius: 20px;
      --font-ui: "Noto Sans KR", "Pretendard", "Malgun Gothic", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-ui);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.74), transparent 34%),
        radial-gradient(circle at top right, rgba(37,99,235,0.18), transparent 24%),
        linear-gradient(180deg, #edf5ff 0%, #d9eafe 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1480px, calc(100vw - 18px));
      margin: 0 auto;
      padding: 12px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
      align-content: start;
      min-height: 100vh;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar {
      padding: 18px;
      display: grid;
      gap: 12px;
      align-self: start;
      align-content: start;
    }

    .titlebar {
      padding: 14px 18px;
      align-self: start;
    }

    .dept-name {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-strong);
      text-align: center;
    }

    .page-title {
      margin: 0;
      font-size: 20px;
      font-weight: 500;
      color: var(--accent-strong);
      text-align: center;
    }

    .page-title::before {
      content: "< ";
    }

    .page-title::after {
      content: " >";
    }

    .nav-switch {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: start;
      min-height: 54px;
      padding: 0 10px;
      border-radius: 18px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
      color: #fff;
      box-shadow: 0 12px 24px rgba(40, 72, 115, 0.12);
      white-space: nowrap;
    }

    .nav-link-read { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
    .nav-link-sites { background: linear-gradient(135deg, #2563eb, #60a5fa); }
    .nav-link-sme { background: linear-gradient(135deg, #1e40af, #2563eb); }
    .nav-link-dashboard { background: linear-gradient(135deg, #0f4c81, #1d70b8); }
    .nav-link:not(.is-active) { opacity: 0.86; }

    .content {
      padding: 18px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .intro {
      display: grid;
      gap: 6px;
      padding: 2px 2px 4px;
    }

    .intro h2 {
      margin: 0;
      font-size: 18px;
      color: var(--accent-strong);
    }

    .intro p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .column-card,
    .major-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(29, 78, 216, 0.12);
      border-radius: 16px;
      background: var(--panel-strong);
      position: relative;
      overflow: hidden;
    }

    .column-card::before,
    .major-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      opacity: 0.95;
    }

    .column-head {
      display: grid;
      gap: 4px;
    }

    .column-head h3,
    .major-head h3,
    .sub-card h4 {
      margin: 0;
      color: var(--accent-strong);
    }

    .column-head h3 { font-size: 16px; }

    .major-list {
      display: grid;
      gap: 14px;
    }

    .major-card {
      gap: 14px;
      padding: 16px;
    }

    .major-card:nth-child(1) {
      background: linear-gradient(180deg, rgba(232, 244, 255, 0.95), rgba(255, 255, 255, 0.92));
      border-color: rgba(59, 130, 246, 0.24);
    }

    .major-card:nth-child(1)::before {
      background: linear-gradient(90deg, #2563eb, #60a5fa);
    }

    .major-card:nth-child(2) {
      background: linear-gradient(180deg, rgba(234, 248, 245, 0.95), rgba(255, 255, 255, 0.92));
      border-color: rgba(20, 184, 166, 0.24);
    }

    .major-card:nth-child(2)::before {
      background: linear-gradient(90deg, #0f766e, #2dd4bf);
    }

    .major-card:nth-child(3) {
      background: linear-gradient(180deg, rgba(255, 247, 234, 0.95), rgba(255, 255, 255, 0.92));
      border-color: rgba(245, 158, 11, 0.24);
    }

    .major-card:nth-child(3)::before {
      background: linear-gradient(90deg, #d97706, #fbbf24);
    }

    .major-card:nth-child(4) {
      background: linear-gradient(180deg, rgba(243, 240, 255, 0.95), rgba(255, 255, 255, 0.92));
      border-color: rgba(124, 58, 237, 0.22);
    }

    .major-card:nth-child(4)::before {
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
    }

    .major-head {
      display: grid;
      gap: 4px;
    }

    .major-head h3 {
      font-size: 18px;
    }

    .major-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .sub-grid {
      display: grid;
      gap: 12px;
    }

    .sub-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(58, 95, 140, 0.14);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
    }

    .sub-card h4 {
      font-size: 15px;
    }

    .sub-card-title:empty {
      display: none;
    }

    .section-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .quick-link-list,
    .link-list {
      display: grid;
      gap: 8px;
    }

    .quick-link-list {
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
    }

    .link-list {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .link-chip {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(29, 78, 216, 0.14);
      background: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      line-height: 1.45;
    }

    .quick-link-list .link-chip {
      min-height: 54px;
      font-size: 13px;
      padding: 10px 12px;
    }

    .quick-link-list .link-chip.has-logo {
      padding: 8px 12px;
    }

    .link-chip-content {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    .link-chip-logo-frame {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--logo-width, 96px);
      height: var(--logo-height, 24px);
      overflow: hidden;
    }

    .link-chip-logo-frame.is-full {
      width: var(--logo-full-width, 100%);
    }

    .link-chip-logo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transform: scale(var(--logo-scale, 1));
      transform-origin: center;
    }

    .link-chip-logo.is-cover {
      object-fit: cover;
    }

    .link-chip-logo.is-fill {
      object-fit: fill;
    }

    .link-chip-text {
      white-space: normal;
    }

    .link-chip:hover {
      border-color: rgba(29, 78, 216, 0.28);
      background: rgba(255, 255, 255, 0.98);
    }

    .stat-chip {
      justify-content: flex-start;
      align-items: flex-start;
      padding: 10px 12px;
      text-align: left;
    }

    .stat-chip-content {
      display: grid;
      gap: 4px;
      width: 100%;
    }

    .stat-chip-title {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
      word-break: keep-all;
    }

    .stat-chip-meta {
      font-size: 11px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--muted);
      word-break: keep-all;
    }

    .tone-search {
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(239, 246, 255, 0.96), rgba(255, 255, 255, 0.92));
      border-color: rgba(37, 99, 235, 0.18);
    }

    .tone-search::before {
      background: linear-gradient(90deg, #2563eb, #60a5fa);
    }

    .tone-news {
      background:
        radial-gradient(circle at top right, rgba(234, 88, 12, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(255, 247, 237, 0.96), rgba(255, 255, 255, 0.92));
      border-color: rgba(234, 88, 12, 0.18);
    }

    .tone-news::before {
      background: linear-gradient(90deg, #ea580c, #fb923c);
    }

    .tone-ai {
      background:
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(245, 243, 255, 0.96), rgba(255, 255, 255, 0.92));
      border-color: rgba(124, 58, 237, 0.18);
    }

    .tone-ai::before {
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
    }

    @media (max-width: 1200px) {
      .link-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 1080px) {
      .section-grid,
      .link-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 860px) {
      .nav-switch {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .link-list,
      .quick-link-list {
        grid-auto-flow: row;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="topbar panel">
      <p class="dept-name">IBK경제연구소 중기산업연구실 중소기업팀</p>
      <div class="nav-switch">
        <a class="nav-link nav-link-read" href="./index.html">읽을거리</a>

    function formatCssSize(value, fallback) {
      if (value === undefined || value === null || value === "") return fallback;
      return typeof value === "number" ? `${value}px` : value;
    }

    quickAccessSections.forEach((section) => {
      section.items = section.items.map((item) => ({
        ...item,
        ...(quickAccessLogoMap[item.url] || {})
      }));
    });

    function renderQuickLinks() {
      const target = document.getElementById("quickAccessGrid");
      target.innerHTML = quickAccessSections.map((section) => `
        <article class="column-card ${section.tone || ""}">
          <div class="column-head">
            <h3>${section.title}</h3>
            <div class="section-note">${section.note}</div>
          </div>
          <div class="quick-link-list">
            ${section.items.map((item) => `
              <a class="link-chip${item.image ? " has-logo" : ""}" href="${item.url}" target="_blank" rel="noopener noreferrer" aria-label="${item.title}" style="${item.chipPaddingX ? `padding-left:${item.chipPaddingX}px;padding-right:${item.chipPaddingX}px;` : ""}">
                <span class="link-chip-content">
                  ${item.image ? `<span class="link-chip-logo-frame${item.fullLogo ? " is-full" : ""}" style="${item.logoWidth ? `--logo-width:${formatCssSize(item.logoWidth, "96px")};` : ""}${item.logoHeight ? `--logo-height:${formatCssSize(item.logoHeight, "24px")};` : ""}${item.logoFullWidth ? `--logo-full-width:${formatCssSize(item.logoFullWidth, "100%")};` : ""}${item.logoScale ? `--logo-scale:${item.logoScale};` : ""}"><img class="link-chip-logo${item.imageFit === "cover" ? " is-cover" : ""}${item.imageFit === "fill" ? " is-fill" : ""}" src="${item.image}" alt="${item.title}"></span>` : `<span class="link-chip-text">${item.title}</span>`}
                </span>
              </a>
            `).join("")}
          </div>
        </article>
      `).join("");
    }

    function splitStatText(text) {
      const match = text.match(/^(.*?)(?:\(([^()]*)\))$/);
      if (!match) {
        return { title: text, meta: "" };
      }

      return {
        title: match[1].trim(),
        meta: match[2].trim()
      };
    }

    function renderStatsCatalog() {
      const target = document.getElementById("statsCatalog");
      target.innerHTML = statsGroups.map((group) => `
        <article class="major-card">
          <div class="major-head">
            <h3>${group.title}</h3>
            <div class="major-meta">${group.note}</div>
          </div>
          <div class="sub-grid">
            ${group.subgroups.map((subgroup) => `
              <section class="sub-card">
                <h4 class="sub-card-title">${subgroup.title}</h4>
                <div class="link-list">
                  ${subgroup.items.map((item) => `
                    <a class="link-chip stat-chip" href="${item.url}" target="_blank" rel="noopener noreferrer">${(() => {
                      const parts = splitStatText(item.title);
                      return `<span class="stat-chip-content"><span class="stat-chip-title">${parts.title}</span>${parts.meta ? `<span class="stat-chip-meta">(${parts.meta})</span>` : ""}</span>`;
                    })()}</a>
                  `).join("")}
                </div>
              </section>
            `).join("")}
          </div>
        </article>
      `).join("");
    }

    renderQuickLinks();
    renderStatsCatalog();
  </script>
