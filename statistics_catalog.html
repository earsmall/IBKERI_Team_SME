<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="유용한 사이트와 주요 검색 링크를 한곳에서 확인하는 페이지">
  <title>유용한 사이트 모음</title>
  <style>
    :root {
      --bg: #e9f2fb;
      --panel: rgba(249, 252, 255, 0.92);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --line: rgba(58, 95, 140, 0.14);
      --ink: #18212b;
      --muted: #627181;
      --accent-strong: #163b7a;
      --shadow: 0 18px 40px rgba(40, 72, 115, 0.12);
      --radius: 20px;
      --font-ui: "Noto Sans KR", "Pretendard", "Malgun Gothic", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-ui);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.74), transparent 34%),
        radial-gradient(circle at top right, rgba(37,99,235,0.18), transparent 24%),
        linear-gradient(180deg, #edf5ff 0%, #d9eafe 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1440px, calc(100vw - 18px));
      margin: 0 auto;
      padding: 12px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
      align-content: start;
      min-height: 100vh;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar {
      padding: 18px;
      display: grid;
      gap: 12px;
      align-self: start;
      align-content: start;
    }

    .titlebar {
      padding: 14px 18px;
      align-self: start;
    }

    .dept-name {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-strong);
      text-align: center;
    }

    .page-title {
      margin: 0;
      font-size: 20px;
      font-weight: 500;
      color: var(--accent-strong);
      text-align: center;
    }

    .page-title::before {
      content: "< ";
    }

    .page-title::after {
      content: " >";
    }

    .nav-switch {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: start;
      min-height: 54px;
      padding: 0 10px;
      border-radius: 18px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
      color: #fff;
      box-shadow: 0 12px 24px rgba(40, 72, 115, 0.12);
      white-space: nowrap;
    }

    .nav-link-read { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
    .nav-link-sites { background: linear-gradient(135deg, #2563eb, #60a5fa); }
    .nav-link-sme { background: linear-gradient(135deg, #1e40af, #2563eb); }
    .nav-link-dashboard { background: linear-gradient(135deg, #0f4c81, #1d70b8); }
    .nav-link:not(.is-active) { opacity: 0.86; }

    .content {
      padding: 18px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .column-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(29, 78, 216, 0.12);
      border-radius: 16px;
      background: var(--panel-strong);
      position: relative;
      overflow: hidden;
    }

    .column-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      opacity: 0.95;
    }

    .column-head {
      display: grid;
      gap: 4px;
    }

    .column-head h3,
    .column-head h4 {
      margin: 0;
      color: var(--accent-strong);
    }

    .column-head h3 { font-size: 16px; }
    .column-head h4 { font-size: 15px; }

    .tone-search {
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(239, 246, 255, 0.96), rgba(255, 255, 255, 0.92));
      border-color: rgba(37, 99, 235, 0.18);
    }

    .tone-search::before {
      background: linear-gradient(90deg, #2563eb, #60a5fa);
    }

    .tone-news {
      background:
        radial-gradient(circle at top right, rgba(234, 88, 12, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(255, 247, 237, 0.96), rgba(255, 255, 255, 0.92));
      border-color: rgba(234, 88, 12, 0.18);
    }

    .tone-news::before {
      background: linear-gradient(90deg, #ea580c, #fb923c);
    }

    .tone-ai {
      background:
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(245, 243, 255, 0.96), rgba(255, 255, 255, 0.92));
      border-color: rgba(124, 58, 237, 0.18);
    }

    .tone-ai::before {
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
    }

    .tone-stats {
      background:
        radial-gradient(circle at top right, rgba(14, 116, 144, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(236, 254, 255, 0.96), rgba(255, 255, 255, 0.92));
      border-color: rgba(14, 116, 144, 0.18);
    }

    .tone-stats::before {
      background: linear-gradient(90deg, #0e7490, #67e8f9);
    }

    .tone-gov {
      background:
        radial-gradient(circle at top right, rgba(22, 163, 74, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(240, 253, 244, 0.96), rgba(255, 255, 255, 0.92));
      border-color: rgba(22, 163, 74, 0.18);
    }

    .tone-gov::before {
      background: linear-gradient(90deg, #16a34a, #86efac);
    }

    .tone-research {
      background:
        radial-gradient(circle at top right, rgba(217, 119, 6, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(255, 251, 235, 0.96), rgba(255, 255, 255, 0.92));
      border-color: rgba(217, 119, 6, 0.18);
    }

    .tone-research::before {
      background: linear-gradient(90deg, #d97706, #facc15);
    }

    .section-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .quick-link-list,
    .site-link-list {
      display: grid;
      gap: 8px;
    }

    .quick-link-list {
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
    }

    .site-link-list {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .link-chip {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(29, 78, 216, 0.14);
      background: rgba(255, 255, 255, 0.88);
      text-decoration: none;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      line-height: 1.35;
    }

    .quick-link-list .link-chip {
      min-height: 54px;
      font-size: 13px;
      padding: 10px 12px;
    }

    .quick-link-list .link-chip.has-logo {
      padding: 8px 12px;
    }

    .link-chip-content {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    .link-chip-logo-frame {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--logo-width, 96px);
      height: var(--logo-height, 24px);
      overflow: hidden;
    }

    .link-chip-logo-frame.is-full {
      width: var(--logo-full-width, 100%);
    }

    .link-chip-logo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      transform: scale(var(--logo-scale, 1));
      transform-origin: center;
    }

    .link-chip-logo.is-cover {
      object-fit: cover;
    }

    .link-chip-logo.is-fill {
      object-fit: fill;
    }

    .link-chip-text {
      white-space: nowrap;
    }

    .link-chip:hover {
      border-color: rgba(29, 78, 216, 0.28);
      background: rgba(255, 255, 255, 0.96);
    }

    @media (max-width: 1040px) {
      .section-grid {
        grid-template-columns: 1fr;
      }

      .site-link-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 860px) {
      .nav-switch {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .quick-link-list,
      .site-link-list {
        grid-auto-flow: row;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="topbar panel">
      <p class="dept-name">IBK경제연구소 중기산업연구실 중소기업팀</p>
      <div class="nav-switch">
        <a class="nav-link nav-link-read" href="./index.html">읽을거리</a>
        <a class="nav-link nav-link-sites is-active" href="./statistics_catalog.html">유용한 사이트</a>
        <a class="nav-link nav-link-sme" href="./SME_data.html">중소기업 통계</a>
        <a class="nav-link nav-link-dashboard" href="./tableau_dashboard.html">시각화 대쉬보드</a>
      </div>
    </section>

    <section class="titlebar panel">
      <h1 class="page-title">유용한 사이트</h1>
    </section>

    <section class="content panel">
      <div class="section-grid" id="quickAccessGrid"></div>
      <div class="section-grid" id="usefulSiteGrid"></div>
    </section>
  </div>

  <script>
    const quickAccessSections = [
      {
        title: "검색엔진",
        tone: "tone-search",
        note: "클릭 시 새 창으로 이동합니다.",
        items: [
          { title: "Google", url: "https://www.google.com/", image: "./img/Google.png" },
          { title: "Naver", url: "https://www.naver.com/", image: "./img/Naver.png?v=20260331-133551" },
          { title: "Youtube", url: "https://youtube.com/?themeRefresh=1", image: "./img/Youtube.png?v=20260331-133537" }
        ]
      },
      {
        title: "언론기사",
        tone: "tone-news",
        note: "네이버 뉴스와 구글 뉴스 바로가기입니다.",
        items: [
          { title: "네이버 뉴스", url: "https://news.naver.com/" },
          { title: "Google 뉴스", url: "https://news.google.com/home?hl=ko&gl=KR&ceid=KR:ko" }
        ]
      },
      {
        title: "AI 도구",
        tone: "tone-ai",
        note: "업무에 자주 쓰는 생성형 AI 도구 모음입니다.",
        items: [
          { title: "ChatGPT", url: "https://chatgpt.com/" },
          { title: "Google Gemini", url: "https://gemini.google.com/app?hl=ko" },
          { title: "Claude", url: "https://claude.ai/new" },
          { title: "NotebookLM", url: "https://notebooklm.google.com/" }
        ]
      }
    ];

    const quickAccessLogoMap = {
      "https://news.naver.com/": {
        image: "./img/N_news.jpeg?v=20260331-133914",
        logoWidth: "100%",
        logoHeight: 38,
        fullLogo: true,
        imageFit: "cover",
        chipPaddingX: 12
      },
      "https://news.google.com/home?hl=ko&gl=KR&ceid=KR:ko": {
        image: "./img/Google%20news.png?v=20260331-133930",
        logoHeight: 34,
        imageFit: "cover",
        fullLogo: true
      },
      "https://chatgpt.com/": {
        image: "./img/ChatGPT.png?v=20260331-135430",
        logoWidth: "100%",
        logoHeight: 34,
        fullLogo: true,
        logoFullWidth: "100%",
        imageFit: "fill"
      },
      "https://gemini.google.com/app?hl=ko": {
        image: "./img/Gemini.jpeg?v=20260331-134215",
        logoWidth: "100%",
        logoHeight: 28
      },
      "https://claude.ai/new": {
        image: "./img/Claude.png?v=20260331-134230",
        logoWidth: "100%",
        logoHeight: 28
      },
      "https://notebooklm.google.com/": {
        image: "./img/NotebookLM.png?v=20260331-135455",
        logoWidth: "100%",
        logoHeight: 38,
        fullLogo: true,
        logoFullWidth: "100%",
        imageFit: "contain"
      }
    };

    function formatCssSize(value, fallback) {
      if (value === undefined || value === null || value === "") return fallback;
      return typeof value === "number" ? `${value}px` : value;
    }

    quickAccessSections.forEach((section) => {
      section.items = section.items.map((item) => ({
        ...item,
        ...(quickAccessLogoMap[item.url] || {})
      }));
    });

    const usefulSiteSections = [
      {
        title: "통계",
        tone: "tone-stats",
        note: "통계 원자료와 대시보드 중심으로 정리했습니다.",
        items: [
          { title: "국가데이터처", url: "https://kosis.kr/index/index.do" },
          { title: "한국은행<br>경제통계시스템", url: "https://ecos.bok.or.kr/#/" },
          { title: "금융통계정보시스템", url: "https://fisis.fss.or.kr/page/main.jsp" },
          { title: "은행통계정보시스템", url: "http://bss.kfb.or.kr/" },
          { title: "산업통계분석시스템", url: "https://www.istans.or.kr/main.html" },
          { title: "중소벤처기업부 통계", url: "https://www.mss.go.kr/site/smba/submain/submain04.do" },
          { title: "중소기업중앙회<br>조사연구통계", url: "https://www.kbiz.or.kr/ko/contents/contents/contents.do?mnSeq=317" },
          { title: "국가데이터처<br>빅데이터 활용", url: "https://data.kostat.go.kr/nowcast/bigmain.do" },
          { title: "한국벤처캐피탈협회<br>통계", url: "https://www.kvca.or.kr/Program/board/list.html?a_gb=board&a_cd=15&a_item=0&sm=4_1" },
          { title: "벤처투자종합포털<br>통계", url: "https://www.vcs.go.kr/web/portal/statistics/dashboard" },
          { title: "통계데이터센터", url: "https://data.mods.go.kr/sbchome/index.do" },
          { title: "마이크로데이터<br>통합서비스", url: "https://mdis.mods.go.kr/index.do" }
        ]
      },
      {
        title: "정부 부처/유관기관",
        tone: "tone-gov",
        note: "정책 자료와 공식 발표를 확인할 수 있는 기관입니다.",
        items: [
          { title: "재정경제부", url: "https://www.mofe.go.kr/" },
          { title: "산업통상부", url: "https://www.motir.go.kr/" },
          { title: "중소벤처기업부", url: "https://www.mss.go.kr/site/smba/main.do" },
          { title: "금융위원회", url: "https://www.fsc.go.kr/index" },
          { title: "금융감독원", url: "https://www.fss.or.kr/fss/main/main.do?menuNo=200000" },
          { title: "한국은행", url: "https://www.bok.or.kr/portal/main/main.do" },
          { title: "은행연합회", url: "https://www.kfb.or.kr/main/main.php" },
          { title: "중소기업중앙회", url: "https://www.kbiz.or.kr/ko/index/index.do" },
          { title: "KDI<br>정책시계열서비스", url: "https://epts.kdi.re.kr/polcTmsesSrvc/them" },
          { title: "한국벤처캐피탈 협회", url: "https://www.kvca.or.kr/" },
          { title: "벤처투자종합포털", url: "https://www.vcs.go.kr/web/portal/main" },
          { title: "국제금융센터", url: "https://www.kcif.or.kr/" }
        ]
      },
      {
        title: "연구기관",
        tone: "tone-research",
        note: "중소기업·금융·거시경제 리포트를 참고할 수 있습니다.",
        items: [
          { title: "한국개발연구원", url: "https://www.kdi.re.kr/" },
          { title: "산업연구원", url: "https://www.kiet.re.kr/" },
          { title: "대외경제정책연구원", url: "https://www.kiep.go.kr/" },
          { title: "한국은행 경제연구원", url: "https://www.bok.or.kr/imer/main/main.do" },
          { title: "한국금융연구원", url: "https://www.kif.re.kr/kif4/main/" },
          { title: "중소벤처기업연구원", url: "https://www.kosi.re.kr/kosbiWar/main" },
          { title: "국회예산정책처", url: "https://www.nabo.go.kr/" },
          { title: "국회미래연구원", url: "https://www.nafi.re.kr/home/kor/main.do" },
          { title: "IBK경제연구소", url: "http://research.ibk.co.kr/research" },
          { title: "산업은행<br>미래전략연구소", url: "https://rd.kdb.co.kr/index.jsp" },
          { title: "수출입은행<br>해외경제연구소", url: "https://keri.koreaexim.go.kr/index" },
          { title: "우리금융경영연구소", url: "https://www.wfri.re.kr/ko/web/main.php" },
          { title: "하나금융연구소", url: "https://www.hanaif.re.kr/main.do" },
          { title: "KB경영연구소", url: "https://www.kbfg.com/kbresearch/index.do" },
          { title: "현대경제연구원", url: "https://www.hri.co.kr/kor/main/main.html" }
        ]
      }
    ];

    function renderColumns(targetId, sections, headingTag, listClass) {
      const target = document.getElementById(targetId);
      target.innerHTML = sections.map((section) => `
        <article class="column-card ${section.tone || ""}">
          <div class="column-head">
            <${headingTag}>${section.title}</${headingTag}>
            <div class="section-note">${section.note}</div>
          </div>
          <div class="${listClass}">
            ${section.items.map((item) => `
              <a class="link-chip${item.image ? " has-logo" : ""}" href="${item.url}" target="_blank" rel="noopener noreferrer" aria-label="${item.title}" style="${item.chipPaddingX ? `padding-left:${item.chipPaddingX}px;padding-right:${item.chipPaddingX}px;` : ""}">
                <span class="link-chip-content">
                  ${item.image ? `<span class="link-chip-logo-frame${item.fullLogo ? " is-full" : ""}" style="${item.logoWidth ? `--logo-width:${formatCssSize(item.logoWidth, "96px")};` : ""}${item.logoHeight ? `--logo-height:${formatCssSize(item.logoHeight, "24px")};` : ""}${item.logoFullWidth ? `--logo-full-width:${formatCssSize(item.logoFullWidth, "100%")};` : ""}${item.logoScale ? `--logo-scale:${item.logoScale};` : ""}"><img class="link-chip-logo${item.imageFit === "cover" ? " is-cover" : ""}${item.imageFit === "fill" ? " is-fill" : ""}" src="${item.image}" alt="${item.title}"></span>` : `<span class="link-chip-text">${item.title}</span>`}
                </span>
              </a>
            `).join("")}
          </div>
        </article>
      `).join("");
    }

    renderColumns("quickAccessGrid", quickAccessSections, "h3", "quick-link-list");
    renderColumns("usefulSiteGrid", usefulSiteSections, "h4", "site-link-list");
  </script>
</body>
</html>
