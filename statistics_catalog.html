  <style>
    :root {
      --bg: #e9f2fb;
      --panel: rgba(249, 252, 255, 0.9);
      --panel-strong: #ffffff;
      --ink: #18212b;
      --muted: #627181;
      --line: rgba(58, 95, 140, 0.14);
      --accent: #1d4ed8;
      --accent-soft: rgba(29, 78, 216, 0.1);
      --accent-strong: #163b7a;
      --shadow: 0 18px 40px rgba(40, 72, 115, 0.12);
      --radius: 20px;
      --radius-sm: 14px;
      --font-ui: "Noto Sans KR", "Pretendard", "Malgun Gothic", sans-serif;
      --font-display: "Noto Sans KR", "Pretendard", "Malgun Gothic", sans-serif;

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-ui);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.74), transparent 34%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.18), transparent 24%),
        linear-gradient(180deg, #edf5ff 0%, #d9eafe 100%);

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:

        linear-gradient(90deg, rgba(255,255,255,0.18) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      opacity: 0.35;
    }

    .shell {
      position: relative;
      display: grid;
      grid-template-columns: minmax(430px, 1.02fr) minmax(0, 2.28fr);
      gap: 18px;
      padding: 18px;
      min-height: 100vh;
      max-width: 2400px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .sidebar {
      padding: 24px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: sticky;
      top: 24px;
      height: calc(100vh - 48px);
      overflow: hidden;

    .dept-name {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--accent-strong);
      line-height: 1.35;
      text-align: center;
    }

    .nav-switch {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .nav-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 0 12px;
      border-radius: 18px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease, border-color 160ms ease;
      box-shadow: 0 12px 24px rgba(40, 72, 115, 0.12);
    }

    .nav-link:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .nav-link-read {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #ffffff;
      border-color: rgba(29, 78, 216, 0.28);
    }

    .nav-link-dashboard {
      background: linear-gradient(135deg, #0f766e, #0ea5a5);
      color: #ffffff;
      border-color: rgba(14, 165, 165, 0.28);
    }

    .nav-link-stats {
      background: linear-gradient(135deg, #b45309, #d97706);
      color: #ffffff;
      border-color: rgba(217, 119, 6, 0.28);
    }

    .nav-link.is-active {
      box-shadow: 0 16px 30px rgba(40, 72, 115, 0.18);
    }

    .nav-link:not(.is-active) {
      opacity: 0.86;
    }

    .nav-link-sub {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.35;
      opacity: 0.88;
    }

    .site-panel {
      display: grid;
      gap: 12px;
      min-height: 0;
      overflow: hidden;
    }

    .site-panel-group {
      display: grid;
      gap: 12px;
      min-height: 0;
    }

    .site-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .site-panel h3 {
      margin: 0;
      font-size: 16px;
      color: var(--accent-strong);
    }

    .site-note {
      font-size: 12px;
      color: var(--muted);
    }

    .site-caution {
      margin-top: -6px;
      font-size: 11px;
      line-height: 1.35;
      color: #9a3412;
    }

    .site-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-content: start;
      overflow: auto;
      padding-right: 2px;
    }

    .site-categories {
      display: grid;
      gap: 14px;
      align-content: start;
      overflow: auto;
      padding-right: 2px;
    }

    .site-category {
      display: grid;
      gap: 8px;
    }

    .site-category-title {
      margin: 0;
      font-size: 12px;
      font-weight: 800;
      color: var(--accent-strong);
      letter-spacing: 0.01em;
    }

    .tool-links {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      align-content: start;
    }

    .site-link {
      display: flex;
      align-items: center;
      min-height: 42px;
      padding: 9px 11px;
      border-radius: 14px;
      border: 1px solid rgba(29, 78, 216, 0.12);
      background: rgba(255,255,255,0.8);
      color: var(--ink);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .site-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(40, 72, 115, 0.1);
      border-color: rgba(29, 78, 216, 0.24);
    }

    .ai-link {
      justify-content: center;
      min-height: 40px;
      padding: 8px 9px;
      border-color: rgba(13, 148, 136, 0.16);
      background: linear-gradient(180deg, rgba(236, 253, 245, 0.96), rgba(220, 252, 231, 0.88));
      text-align: center;
      font-size: 11px;
      line-height: 1.2;
    }

    .ai-link:hover {
      border-color: rgba(13, 148, 136, 0.28);
      box-shadow: 0 10px 20px rgba(20, 120, 110, 0.12);
    }

    .icon-links {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .icon-link {
      display: grid;
      justify-items: center;
      gap: 4px;
      padding: 6px 8px 5px;
      border-radius: 16px;
      border: 1px solid rgba(29, 78, 216, 0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(236, 244, 255, 0.92));
      color: var(--ink);
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .icon-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(40, 72, 115, 0.1);
      border-color: rgba(29, 78, 216, 0.24);

    .icon-link-badge {

      height: 30px;

      place-items: center;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 12px 24px rgba(40, 72, 115, 0.18);

      height: 180px;

      border: 1px solid rgba(29, 78, 216, 0.14);

    .cards {

      gap: 10px;
      align-content: start;

    .card {

      border-radius: 18px;
      padding: 14px;
      background: var(--panel-strong);
      transition: transform 160ms ease, box-shadow 160ms ease;
      display: grid;
      gap: 10px;

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(60, 52, 45, 0.1);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .agency {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
    }

    .date-chip {
      font-size: 11px;
      color: var(--muted);
    }

    .group-list {
      display: grid;
      gap: 14px;
    }

    .leaf-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .leaf-link {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(29, 78, 216, 0.12);
      background: rgba(255,255,255,0.82);
      color: var(--ink);
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .leaf-link::before {
      content: "";
      width: 7px;
      height: 7px;
      margin-top: 0.5em;
      border-radius: 999px;
      background: linear-gradient(135deg, #1d4ed8, #60a5fa);
      flex: 0 0 auto;
    }

    .leaf-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(40, 72, 115, 0.1);
      border-color: rgba(29, 78, 216, 0.24);
    }

    .leaf-link span {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
      color: inherit;
    }

    .group-block {
      display: grid;
      gap: 8px;
    }

    .group-heading {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .empty {
      border: 1px dashed rgba(29, 78, 216, 0.25);
      border-radius: 18px;
      padding: 28px 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.6);
    }

    @media (max-width: 1120px) {
      .shell {
        grid-template-columns: 1fr;
        max-width: none;
      }

      .sidebar {
        position: static;
        height: auto;
      }

      .main {
        grid-template-rows: auto auto;
        min-height: auto;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 14px;
      }

      .hero,
      .section,
      .sidebar {
        padding: 18px;
      }

      .nav-switch,
      .site-links,
      .tool-links,
      .icon-links {
        grid-template-columns: 1fr;
      }

      .leaf-list {
        grid-template-columns: 1fr;
      }

      .hero h2 {
        font-size: 24px;
      }
    }

    @media (max-width: 1180px) and (min-width: 721px) {
      .leaf-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1800px) and (min-height: 980px) {
      .shell {
        width: min(1880px, calc(100vw - 48px));
        max-width: none;
        min-height: calc(100vh - 24px);
        grid-template-columns: minmax(610px, 1.1fr) minmax(0, 2.1fr);
        gap: 22px;
        padding: 12px 18px;
      }

      .sidebar {
        top: 12px;
        height: calc(100vh - 24px);
      }

      .main {
        min-height: calc(100vh - 24px);
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    const cardsEl = document.getElementById("cards");
    const listNoteEl = document.getElementById("listNote");
    const searchLinksEl = document.getElementById("searchLinks");
    const aiToolLinksEl = document.getElementById("aiToolLinks");
    const siteLinksEl = document.getElementById("siteLinks");

    function parseMarkdown(source) {
      const lines = source.split(/\r?\n/);
      const searchEngines = [];
      const aiTools = [];
      const usefulSiteGroups = [];
      const sections = [];
      let currentTopCategory = null;
      let currentUsefulGroup = null;
      let currentSection = null;
      let currentGroup = null;
      let pendingItem = null;
      let pendingSite = null;

      for (const rawLine of lines) {
        const line = rawLine.trim();

        if (!line || line === "---") {
          continue;
        }

        if (line.startsWith("# ")) {
          const title = line.slice(2).trim();

          if (title === "검색 엔진" || title === "AI Tools" || title === "유용한 사이트") {
            currentTopCategory = title;
            currentSection = null;
            currentGroup = null;
            currentUsefulGroup = null;
            pendingItem = null;
            pendingSite = null;
            continue;
          }

          currentSection = {
            title,
            groups: []
          };
          sections.push(currentSection);
          currentTopCategory = null;
          currentUsefulGroup = null;
          currentGroup = null;
          pendingItem = null;
          pendingSite = null;
          continue;
        }

        if (line.startsWith("## ")) {
          if (currentTopCategory === "유용한 사이트") {
            currentUsefulGroup = {
              title: line.slice(3).trim(),
              items: []
            };
            usefulSiteGroups.push(currentUsefulGroup);
            pendingSite = null;
            continue;
          }

          if (!currentSection) {
            continue;
          }

          currentGroup = {
            title: line.slice(3).trim(),
            items: []
          };
          currentSection.groups.push(currentGroup);
          pendingItem = null;
          continue;
        }

        if ((currentTopCategory === "검색 엔진" || currentTopCategory === "AI Tools" || currentTopCategory === "유용한 사이트") && line.startsWith("- ")) {
          pendingSite = {
            title: line.slice(2).trim(),
            url: ""
          };

          if (currentTopCategory === "검색 엔진") {
            searchEngines.push(pendingSite);
          } else if (currentTopCategory === "AI Tools") {
            aiTools.push(pendingSite);
          } else {
            if (!currentUsefulGroup) {
              currentUsefulGroup = {
                title: "기타",
                items: []
              };
              usefulSiteGroups.push(currentUsefulGroup);
            }
            currentUsefulGroup.items.push(pendingSite);
          }
          continue;
        }

        if (/^https?:\/\//i.test(line) && pendingSite && !pendingSite.url) {
          pendingSite.url = line;
          continue;
        }

        if (line.startsWith("- ")) {
          if (!currentGroup && currentSection) {
            currentGroup = {
              title: "기타",
              items: []
            };
            currentSection.groups.push(currentGroup);
          }

          if (!currentGroup) {
            continue;
          }

          pendingItem = {
            title: line.slice(2).trim(),
            url: ""
          };
          currentGroup.items.push(pendingItem);
          continue;
        }

        if (/^https?:\/\//i.test(line) && pendingItem) {
          pendingItem.url = line;
        }
      }

      return {
        searchEngines: searchEngines.filter(site => site.title && site.url),
        aiTools: aiTools.filter(site => site.title && site.url),
        usefulSiteGroups: usefulSiteGroups.map(group => ({
          ...group,
          items: group.items.filter(item => item.title && item.url)
        })).filter(group => group.title && group.items.length),
        sections: sections.map(section => ({
          ...section,
          groups: section.groups.map(group => ({
            ...group,
            items: group.items.filter(item => item.title && item.url)
          })).filter(group => group.title)
        })).filter(section => section.title)
      };
    }

    function createLeafLink(item) {
      return `
        <a class="leaf-link" href="${item.url}" target="_blank" rel="noopener noreferrer">
          <span>${item.title}</span>
        </a>
      `;
    }

    function renderUsefulSites(data) {
      siteLinksEl.innerHTML = data.map(group => `
        <section class="site-category">
          <h4 class="site-category-title">${group.title}</h4>
          <div class="site-links">
            ${group.items.map(site => `<a class="site-link" href="${site.url}" target="_blank" rel="noopener noreferrer">${site.title}</a>`).join("")}
          </div>
        </section>
      `).join("");
    }

    function renderBoxLinks(targetEl, data, className = "site-link") {
      targetEl.innerHTML = data.map(site => `
        <a class="${className}" href="${site.url}" target="_blank" rel="noopener noreferrer">${site.title}</a>
      `).join("");
    }

    function renderIconLinks(targetEl, data, options) {
      const { badgeMap, toneClassMap } = options;

      targetEl.innerHTML = data.map(site => {
        const toneClass = toneClassMap[site.title] || "";
        const badge = badgeMap[site.title] || site.title.slice(0, 1).toUpperCase();
        return `
          <a class="icon-link ${toneClass}" href="${site.url}" target="_blank" rel="noopener noreferrer" aria-label="${site.title}">
            <span class="icon-link-badge" aria-hidden="true">${badge}</span>
            <span class="icon-link-label">${site.title}</span>
          </a>
        `;
      }).join("");
    }

    function orderSections(data) {
      const preferredOrder = ["중소기업", "소상공인, 자영업자", "수출 중소기업", "중소기업 금융"];
      const rank = new Map(preferredOrder.map((title, index) => [title, index]));

      return [...data].sort((a, b) => {
        const aRank = rank.has(a.title) ? rank.get(a.title) : Number.MAX_SAFE_INTEGER;
        const bRank = rank.has(b.title) ? rank.get(b.title) : Number.MAX_SAFE_INTEGER;
        if (aRank !== bRank) return aRank - bRank;
        return a.title.localeCompare(b.title, "ko");
      });
    }

    function renderCards(data) {
      const orderedData = orderSections(data);
      const totalItems = orderedData.reduce((sum, section) => {
        return sum + section.groups.reduce((groupSum, group) => groupSum + group.items.length, 0);
      }, 0);

      listNoteEl.textContent = `${orderedData.length}개 대분류 · ${totalItems}개 통계표`;

      cardsEl.innerHTML = orderedData.map(section => `
        <article class="card">
          <div class="card-top">
            <span class="agency">${section.title}</span>
            <span class="date-chip">${section.groups.length}개 중분류</span>
          </div>
          <div class="group-list">
            ${section.groups.map(group => `
                <div class="group-block">
                  <h4 class="group-heading">${group.title}</h4>
                  <div class="leaf-list">
                    ${group.items.length ? group.items.map(createLeafLink).join("") : '<div class="empty">연결된 통계표가 없습니다.</div>'}
                  </div>
                </div>
            `).join("")}
          </div>
        </article>
      `).join("");
    }

    const parsed = parseMarkdown(markdownSource);
    renderIconLinks(searchLinksEl, parsed.searchEngines, {
      badgeMap: {
        Google: "G",
        Naver: "N",
        Youtube: "▶"
      },
      toneClassMap: {
        Google: "search-google",
        Naver: "search-naver",
        Youtube: "search-youtube"
      }
    });
    renderBoxLinks(aiToolLinksEl, parsed.aiTools, "site-link ai-link");
    renderUsefulSites(parsed.usefulSiteGroups);
    renderCards(parsed.sections);
  </script>
