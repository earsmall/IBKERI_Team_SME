<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IBKERI 중소기업팀의 태블로 시각화 대시보드를 한곳에서 확인하는 웹페이지입니다.">
  <title>중소기업팀 시각화 대시보드</title>
  <style>
    :root {
      --bg: #e9f2fb;
      --panel: rgba(249, 252, 255, 0.9);
      --panel-strong: #ffffff;
      --ink: #18212b;
      --muted: #627181;
      --line: rgba(58, 95, 140, 0.14);
      --accent: #1d4ed8;
      --accent-soft: rgba(29, 78, 216, 0.1);
      --accent-strong: #163b7a;
      --shadow: 0 18px 40px rgba(40, 72, 115, 0.12);
      --radius: 20px;
      --radius-sm: 14px;
      --font-ui: "Noto Sans KR", "Pretendard", "Malgun Gothic", sans-serif;
      --font-display: "Noto Sans KR", "Pretendard", "Malgun Gothic", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: var(--font-ui);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.74), transparent 34%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.18), transparent 24%),
        linear-gradient(180deg, #edf5ff 0%, #d9eafe 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.18) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      opacity: 0.35;
    }

    .shell {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 16px;
      padding: 12px;
      min-height: 100vh;
      width: min(1988px, calc(100vw - 8px));
      max-width: none;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar {
      padding: 14px 16px;
      display: grid;
      gap: 10px;
      align-self: start;
    }

    .topbar-row {
      display: grid;
      grid-template-columns: max-content minmax(320px, 560px);
      gap: 12px;
      align-items: center;
      justify-content: start;
    }

    .topbar-row.controls {
      grid-template-columns: auto minmax(280px, 560px);
      gap: 14px;
      align-items: center;
      justify-content: start;
    }

    .dept-name {
      display: block;
      margin-bottom: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--accent-strong);
      line-height: 1.35;
      text-align: left;
    }

    .nav-switch {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .nav-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      padding: 0 11px;
      border-radius: 18px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      line-height: 1.3;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease, border-color 160ms ease;
      box-shadow: 0 12px 24px rgba(40, 72, 115, 0.12);
    }

    .nav-link:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .nav-link-read {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #ffffff;
      border-color: rgba(29, 78, 216, 0.28);
    }

    .nav-link-dashboard {
      background: linear-gradient(135deg, #0f766e, #0ea5a5);
      color: #ffffff;
      border-color: rgba(14, 165, 165, 0.28);
    }

    .nav-link-stats {
      background: linear-gradient(135deg, #b45309, #d97706);
      color: #ffffff;
      border-color: rgba(217, 119, 6, 0.28);
    }

    .nav-link.is-active {
      box-shadow: 0 16px 30px rgba(40, 72, 115, 0.18);
    }

    .nav-link:not(.is-active) {
      opacity: 0.86;
    }

    .nav-link-sub {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.25;
      opacity: 0.88;
    }

    .list-label {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(29, 78, 216, 0.12);
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(236, 244, 255, 0.98));
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(40, 72, 115, 0.08);
    }

    .topbar > .list-label {
      display: none;
    }

    .dashboard-picker {
      display: grid;
      gap: 0;
      min-width: 0;
      max-width: 620px;
    }

    .dashboard-select {
      width: 100%;
      border: 1px solid rgba(29, 78, 216, 0.12);
      border-radius: 18px;
      padding: 11px 16px;
      background: rgba(255,255,255,0.76);
      color: inherit;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      outline: none;
      transition: box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--accent-strong) 50%),
        linear-gradient(135deg, var(--accent-strong) 50%, transparent 50%),
        linear-gradient(135deg, rgba(255,255,255,0.92), rgba(236, 244, 255, 0.98));
      background-position:
        calc(100% - 22px) calc(50% - 3px),
        calc(100% - 16px) calc(50% - 3px),
        0 0;
      background-size: 6px 6px, 6px 6px, 100% 100%;
      background-repeat: no-repeat;
    }

    .dashboard-select:hover,
    .dashboard-select:focus {
      border-color: rgba(29, 78, 216, 0.24);
      box-shadow: 0 10px 24px rgba(60, 52, 45, 0.1);
    }

    .dashboard-helper {
      display: none;
    }

    .main {
      min-height: 0;
    }

    .viewer {
      padding: 14px 12px 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
    }

    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .viewer-head h3 {
      margin: 0;
      font-size: 18px;
    }

    .viewer-note {
      font-size: 13px;
      color: var(--muted);
    }

    .viz-frame {
      --viz-scale: 1;
      --viz-base-height: 720px;
      min-height: calc(var(--viz-base-height) * var(--viz-scale));
      border-radius: 18px;
      border: 1px solid rgba(29, 78, 216, 0.14);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.98), rgba(236, 244, 255, 0.96));
      overflow: hidden;
    }

    .viz-stage {
      width: calc(100% / var(--viz-scale));
      min-height: calc(var(--viz-base-height) / var(--viz-scale));
      transform: scale(var(--viz-scale));
      transform-origin: top left;
    }

    tableau-viz {
      width: 100%;
      height: 100%;
      min-height: var(--viz-base-height);
      background: transparent;
      display: block;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 320px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 1120px) {
      .shell {
        width: min(100%, calc(100vw - 8px));
        padding: 16px;
      }

      .topbar-row,
      .topbar-row.controls {
        grid-template-columns: 1fr;
        justify-content: stretch;
      }

      .main {
        min-height: auto;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 14px;
      }

      .topbar,
      .viewer {
        padding: 18px;
      }

      .topbar > .list-label {
        display: none;
      }

      .nav-switch {
        grid-template-columns: 1fr;
      }

      .viz-frame,
      .viz-stage,
      tableau-viz {
        --viz-base-height: 620px;
      }
    }

    @media (min-width: 1800px) and (min-height: 980px) {
      .shell {
        width: min(1996px, calc(100vw - 4px));
        max-width: none;
        min-height: calc(100vh - 16px);
        gap: 14px;
        padding: 8px;
      }

      .topbar {
        padding: 12px 16px;
      }

      .main {
        min-height: calc(100vh - 16px);
      }

      .viewer {
        padding: 12px 10px 10px;
      }

      .viz-frame {
        --viz-base-height: 940px;
      }

      .viz-stage,
      tableau-viz {
        --viz-base-height: 940px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="topbar panel">
      <div class="topbar-row">
        <div class="dept-name">IBK경제연구소 중기산업연구실 중소기업팀</div>
        <div class="nav-switch">
          <a class="nav-link nav-link-read" href="./index.html">
            <span>읽을거리</span>
          </a>
          <a class="nav-link nav-link-stats" href="./statistics_catalog.html">
            <span>통계 등 검색</span>
          </a>
          <a class="nav-link nav-link-dashboard is-active" href="./tableau_dashboard.html">
            <span>시각화 대쉬보드</span>
          </a>
        </div>
      </div>

      <div class="list-label">&lt; 대쉬보드 목록 &gt;</div>

      <div class="topbar-row controls">
        <div class="dashboard-picker">
          <select id="dashboardSelect" class="dashboard-select" aria-label="대시보드 목록"></select>
          <div id="dashboardHelper" class="dashboard-helper"></div>
        </div>
      </div>
    </section>
    <main class="main">
      <section class="viewer panel">
        <div class="viewer-head">
          <h3 id="viewerTitle">대시보드 보기</h3>
          <div class="viewer-note">브라우저 환경에 따라 로딩에 몇 초 정도 걸릴 수 있습니다.</div>
        </div>
        <div class="viz-frame">
          <div id="vizMount" class="empty">대시보드를 불러오는 중입니다.</div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>
  <script>
    const dashboards = [
      {
        id: "sme-overview",
        title: "중소기업 주요 현황",
        category: "SME",
        description: "중소기업 전반의 핵심 흐름을 빠르게 확인할 수 있는 기본 현황 대시보드입니다.",
        url: "https://public.tableau.com/views/__17502119731210/sheet30?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "self-employed-overview",
        title: "자영업자 주요 현황",
        category: "Self-employed",
        description: "자영업자 관련 주요 지표를 같은 레이아웃으로 확인할 수 있도록 연결했습니다.",
        url: "https://public.tableau.com/views/__17502333777740/sheet26?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "export-sme-overview",
        title: "수출 중소기업 주요 현황",
        category: "Exports",
        description: "수출 중소기업의 실적과 흐름을 집중해서 볼 수 있는 대시보드입니다.",
        url: "https://public.tableau.com/views/__17502346824890/sheet0_1?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "bank-loan-market",
        title: "은행권 중소기업대출 시장 현황",
        category: "Finance",
        description: "은행권의 중소기업대출 시장 규모와 동향을 살펴볼 수 있습니다.",
        url: "https://public.tableau.com/views/__17478138225250/sheet12?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "venture-investment",
        title: "벤처투자 현황",
        category: "Investment",
        description: "벤처투자 관련 지표를 빠르게 점검할 수 있는 시각화입니다.",
        url: "https://public.tableau.com/views/__17742427007920/sheet0?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "domestic-bank-overview",
        title: "국내은행 주요 현황",
        category: "Banking",
        description: "국내은행의 핵심 현황을 요약해서 살펴볼 수 있는 대시보드입니다.",
        url: "https://public.tableau.com/views/__17512724069940/sheet16?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      },
      {
        id: "bok-fsa",
        title: "한국은행 연간 기업경영분석 주요 결과",
        category: "BOK",
        description: "한국은행 기업경영분석의 주요 결과를 시각적으로 정리한 대시보드입니다.",
        url: "https://public.tableau.com/views/250509_BOK_FSA/1?:language=ko-KR&:sid=&:redirect=auth&:display_count=n&:origin=viz_share_link"
      }
    ];

    const state = {
      selectedId: dashboards[0]?.id ?? null
    };

    const els = {
      dashboardSelect: document.getElementById("dashboardSelect"),
      dashboardHelper: document.getElementById("dashboardHelper"),
      viewerTitle: document.getElementById("viewerTitle"),
      vizMount: document.getElementById("vizMount")
    };

    const controlsRow = document.querySelector(".topbar-row.controls");
    if (controlsRow && !controlsRow.querySelector(".list-label")) {
      const label = document.createElement("div");
      label.className = "list-label";
      label.textContent = "< 대쉬보드 목록 >";
      controlsRow.insertBefore(label, controlsRow.firstChild);
    }

    const controlsLabel = document.querySelector(".topbar-row.controls .list-label");
    if (controlsLabel) {
      controlsLabel.textContent = "대쉬보드 선택하기 ->>>";
    }

    const controlsLabelOverride = document.querySelector(".topbar-row.controls .list-label");
    if (controlsLabelOverride) {
      controlsLabelOverride.textContent = "시각화 대쉬보드 선택하기 >>>>>";
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function updateVizScale() {
      const frame = document.querySelector(".viz-frame");
      const stage = document.querySelector(".viz-stage");
      if (!frame || !stage) return;

      const frameWidth = frame.clientWidth;
      const shouldScale = window.innerWidth >= 1500 && frameWidth >= 1100;
      const isLargeDesktop = window.innerWidth >= 1500 && window.innerHeight >= 900;
      const scale = shouldScale
        ? clamp(frameWidth / 1180, 1, 1.28)
        : 1;
      const baseHeight = window.innerWidth <= 720
        ? 620
        : isLargeDesktop
          ? Math.max(940, window.innerHeight - 90)
          : 720;

      frame.style.setProperty("--viz-scale", scale.toFixed(3));
      frame.style.setProperty("--viz-base-height", `${Math.round(baseHeight)}px`);
    }

    function getFilteredDashboards() {
      return dashboards;
    }

    function getSelectedDashboard(filteredDashboards) {
      if (!filteredDashboards.length) return null;
      const selected = filteredDashboards.find(item => item.id === state.selectedId);
      if (selected) return selected;
      return filteredDashboards[0] ?? dashboards[0] ?? null;
    }

    function renderDashboardPicker(filteredDashboards, selectedDashboard) {
      if (!filteredDashboards.length) {
        els.dashboardSelect.innerHTML = '<option value="">표시할 대시보드가 없습니다.</option>';
        els.dashboardHelper.textContent = "";
        return;
      }

      els.dashboardSelect.innerHTML = filteredDashboards.map(item => `
        <option value="${item.id}"${selectedDashboard && selectedDashboard.id === item.id ? " selected" : ""}>
          ${item.title}
        </option>
      `).join("");

      els.dashboardHelper.textContent = selectedDashboard?.description ?? "";
    }

    function renderViz(selectedDashboard) {
      if (!selectedDashboard) {
        els.vizMount.className = "empty";
        els.vizMount.textContent = "표시할 대시보드가 없습니다.";
        return;
      }

      els.vizMount.className = "";
      els.vizMount.innerHTML = `
        <div class="viz-stage">
          <tableau-viz
            id="tableauViz"
            src="${selectedDashboard.url}"
            toolbar="bottom"
            hide-tabs
            device="desktop"
          ></tableau-viz>
        </div>
      `;

      requestAnimationFrame(updateVizScale);
    }

    function render() {
      const filteredDashboards = getFilteredDashboards();

      if (!filteredDashboards.some(item => item.id === state.selectedId) && filteredDashboards[0]) {
        state.selectedId = filteredDashboards[0].id;
      }

      const selectedDashboard = getSelectedDashboard(filteredDashboards);

      renderDashboardPicker(filteredDashboards, selectedDashboard);
      renderViz(selectedDashboard);

      if (selectedDashboard) {
        els.viewerTitle.textContent = selectedDashboard.title;
      }

    }

    els.dashboardSelect.addEventListener("change", event => {
      state.selectedId = event.target.value;
      render();
    });

    render();
    window.addEventListener("resize", updateVizScale);
  </script>
</body>
</html>
