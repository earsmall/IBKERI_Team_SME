<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="통계목록 기준으로 중소기업 관련 국가통계를 대분류와 중분류로 정리한 페이지">
  <title>중소기업 통계</title>
  <style>
    :root {
      --bg: #e9f2fb;
      --panel: rgba(249, 252, 255, 0.92);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --line: rgba(58, 95, 140, 0.14);
      --ink: #18212b;
      --muted: #627181;
      --accent-strong: #163b7a;
      --shadow: 0 18px 40px rgba(40, 72, 115, 0.12);
      --radius: 20px;
      --font-ui: "Noto Sans KR", "Pretendard", "Malgun Gothic", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-ui);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.74), transparent 34%),
        radial-gradient(circle at top right, rgba(37,99,235,0.18), transparent 24%),
        linear-gradient(180deg, #edf5ff 0%, #d9eafe 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1480px, calc(100vw - 18px));
      margin: 0 auto;
      padding: 12px;
      display: grid;
      gap: 14px;
      min-height: 100vh;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar {
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .titlebar {
      padding: 14px 18px;
    }

    .dept-name {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-strong);
      text-align: center;
    }

    .page-title {
      margin: 0;
      font-size: 20px;
      font-weight: 500;
      color: var(--accent-strong);
      text-align: center;
    }

    .page-title::before { content: "< "; }
    .page-title::after { content: " >"; }

    .nav-switch {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 10px;
      border-radius: 18px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
      color: #fff;
      box-shadow: 0 12px 24px rgba(40, 72, 115, 0.12);
      white-space: nowrap;
    }

    .nav-link-read { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
    .nav-link-sites { background: linear-gradient(135deg, #2563eb, #60a5fa); }
    .nav-link-sme { background: linear-gradient(135deg, #1e40af, #2563eb); }
    .nav-link-dashboard { background: linear-gradient(135deg, #0f4c81, #1d70b8); }
    .nav-link:not(.is-active) { opacity: 0.86; }

    .main {
      padding: 18px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .intro {
      display: grid;
      gap: 6px;
      padding: 2px 2px 4px;
    }

    .intro h2 {
      margin: 0;
      font-size: 18px;
      color: var(--accent-strong);
    }

    .intro p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .major-list {
      display: grid;
      gap: 14px;
    }

    .major-card {
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid rgba(29, 78, 216, 0.12);
      border-radius: 18px;
      background: var(--panel-strong);
      position: relative;
      overflow: hidden;
    }

    .major-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      opacity: 0.95;
    }

    .major-card:nth-child(1) {
      background: linear-gradient(180deg, rgba(232, 244, 255, 0.95), rgba(255, 255, 255, 0.92));
      border-color: rgba(59, 130, 246, 0.24);
    }

    .major-card:nth-child(1)::before { background: linear-gradient(90deg, #2563eb, #60a5fa); }

    .major-card:nth-child(2) {
      background: linear-gradient(180deg, rgba(234, 248, 245, 0.95), rgba(255, 255, 255, 0.92));
      border-color: rgba(20, 184, 166, 0.24);
    }

    .major-card:nth-child(2)::before { background: linear-gradient(90deg, #0f766e, #2dd4bf); }

    .major-card:nth-child(3) {
      background: linear-gradient(180deg, rgba(255, 247, 234, 0.95), rgba(255, 255, 255, 0.92));
      border-color: rgba(245, 158, 11, 0.24);
    }

    .major-card:nth-child(3)::before { background: linear-gradient(90deg, #d97706, #fbbf24); }

    .major-card:nth-child(4) {
      background: linear-gradient(180deg, rgba(243, 240, 255, 0.95), rgba(255, 255, 255, 0.92));
      border-color: rgba(124, 58, 237, 0.22);
    }

    .major-card:nth-child(4)::before { background: linear-gradient(90deg, #7c3aed, #a78bfa); }

    .major-head {
      display: grid;
      gap: 4px;
    }

    .major-head h2 {
      margin: 0;
      font-size: 18px;
      color: var(--accent-strong);
    }

    .major-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .sub-grid {
      display: grid;
      gap: 12px;
    }

    .sub-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(58, 95, 140, 0.14);
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
    }

    .sub-card h3 {
      margin: 0;
      font-size: 15px;
      color: var(--accent-strong);
    }

    .sub-card-title:empty {
      display: none;
    }

    .link-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .link-chip {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      min-height: 48px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(29, 78, 216, 0.14);
      background: rgba(255,255,255,0.92);
      text-decoration: none;
      color: var(--ink);
      text-align: left;
    }

    .link-chip:hover {
      border-color: rgba(29, 78, 216, 0.28);
      background: rgba(255,255,255,0.98);
    }

    .stat-chip-content {
      display: grid;
      gap: 4px;
      width: 100%;
    }

    .stat-chip-title {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
      word-break: keep-all;
    }

    .stat-chip-meta {
      font-size: 11px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--muted);
      word-break: keep-all;
    }

    @media (max-width: 1200px) {
      .link-list { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 1080px) {
      .link-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 860px) {
      .nav-switch { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .link-list { grid-template-columns: 1fr; }
    }
  </style>
</head>

              { title: "기업규모별 수출입(기업특성별무역통계, 국가데이터처 등)", url: "https://kosis.kr/statHtml/statHtml.do?orgId=101&tblId=DT_1TEC_P116&conn_path=I2" },
              { title: "기업규모별, 주요국가별 수출입(기업특성별무역통계, 국가데이터처 등)", url: "https://kosis.kr/statHtml/statHtml.do?orgId=101&tblId=DT_1TEC_P227&conn_path=I2" },
              { title: "산업별, 기업규모별 수출입(기업특성별무역통계, 국가데이터처 등)", url: "https://kosis.kr/statHtml/statHtml.do?orgId=101&tblId=DT_1TEC_P116&conn_path=I2" },
              { title: "대륙별, 국가별 중소기업 수출(중소기업수출동향, 중소벤처기업부)", url: "https://kosis.kr/statHtml/statHtml.do?orgId=142&tblId=DT_B10066&conn_path=I2" }
            ]
          }
        ]
      }
    ];

    function splitStatText(text) {
      const match = text.match(/^(.*?)(?:\(([^()]*)\))$/);
      if (!match) {
        return { title: text, meta: "" };
      }

      return {
        title: match[1].trim(),
        meta: match[2].trim()
      };
    }

    const majorListEl = document.getElementById("majorList");
    majorListEl.innerHTML = statsGroups.map((group) => `
      <article class="major-card">
        <div class="major-head">
          <h2>${group.title}</h2>
          <div class="major-meta">${group.note}</div>
        </div>
        <div class="sub-grid">
          ${group.subgroups.map((subgroup) => `
            <section class="sub-card">
              <h3 class="sub-card-title">${subgroup.title}</h3>
              <div class="link-list">
                ${subgroup.items.map((item) => {
                  const parts = splitStatText(item.title);
                  return `
                    <a class="link-chip" href="${item.url}" target="_blank" rel="noopener noreferrer">
                      <span class="stat-chip-content">
                        <span class="stat-chip-title">${parts.title}</span>
                        ${parts.meta ? `<span class="stat-chip-meta">(${parts.meta})</span>` : ""}
                      </span>
                    </a>
                  `;
                }).join("")}
              </div>
            </section>
          `).join("")}
        </div>
      </article>
    `).join("");
  </script>
</body>
</html>
